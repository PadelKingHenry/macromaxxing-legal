<!DOCTYPE html>
<html>
<head><title>TikTok OAuth Callback</title>
<style>body{font-family:monospace;padding:20px;background:#111;color:#eee;}.code{background:#222;padding:15px;border-radius:8px;word-break:break-all;font-size:14px;color:#4eff91;}</style>
</head>
<body>
<h2>Authorization Complete</h2>
<p>Authorization code:</p>
<div class="code" id="code"></div>
<script>
const p = new URLSearchParams(window.location.search);
const code = p.get('code') || 'not found';
document.getElementById('code').textContent = code;
document.title = 'CODE: ' + code;
</script>
</body>
</html>
